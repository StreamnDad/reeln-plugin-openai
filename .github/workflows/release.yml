name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Create venv and install
        run: |
          uv venv .venv --python 3.11
          source .venv/bin/activate
          uv pip install "git+https://github.com/StreamnDad/reeln-cli"
          uv pip install -e ".[dev]"

      - name: Lint
        run: .venv/bin/ruff check .

      - name: Type check
        run: .venv/bin/mypy reeln_openai_plugin/

      - name: Test
        run: .venv/bin/python -m pytest tests/ -n auto --cov=reeln_openai_plugin --cov-branch --cov-fail-under=100 -q

      - name: Build
        run: |
          source .venv/bin/activate
          uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true
