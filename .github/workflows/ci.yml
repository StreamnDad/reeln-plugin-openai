name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Create venv and install
        run: |
          uv venv .venv --python ${{ matrix.python-version }}
          source .venv/bin/activate
          uv pip install "git+https://github.com/StreamnDad/reeln-cli"
          uv pip install -e ".[dev]"

      - name: Lint
        run: .venv/bin/ruff check .

      - name: Type check
        run: .venv/bin/mypy reeln_openai_plugin/

      - name: Test
        run: .venv/bin/python -m pytest tests/ -n auto --cov=reeln_openai_plugin --cov-branch --cov-fail-under=100 -q
